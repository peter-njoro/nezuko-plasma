<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff66aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff1493;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bgGradient)" opacity="0.9" filter="url(#glow)"/>
  
  <!-- Outer ring -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  
  <!-- Face circle -->
  <circle cx="128" cy="110" r="45" fill="#ffe0ec" opacity="0.95"/>
  
  <!-- Eyes -->
  <circle cx="115" cy="100" r="6" fill="#333333"/>
  <circle cx="141" cy="100" r="6" fill="#333333"/>
  <circle cx="116" cy="98" r="2" fill="#ffffff"/>
  <circle cx="142" cy="98" r="2" fill="#ffffff"/>
  
  <!-- Mouth -->
  <path d="M 120 115 Q 128 120 136 115" stroke="#ff66aa" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Horns/Demon Mark -->
  <path d="M 100 75 Q 95 60 100 50 Q 105 65 110 80" fill="#ff66aa" filter="url(#glow)"/>
  <path d="M 156 75 Q 161 60 156 50 Q 151 65 146 80" fill="#ff66aa" filter="url(#glow)"/>
  
  <!-- Decorative elements - sakura petals -->
  <circle cx="70" cy="80" r="3" fill="#ffb3d9" opacity="0.8"/>
  <circle cx="186" cy="90" r="3" fill="#ffb3d9" opacity="0.8"/>
  <circle cx="75" cy="160" r="3" fill="#ffb3d9" opacity="0.8"/>
  <circle cx="180" cy="155" r="3" fill="#ffb3d9" opacity="0.8"/>
  
  <!-- Inner glow -->
  <circle cx="128" cy="128" r="110" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.3"/>
  
  <!-- Text -->
  <text x="128" y="200" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#ffffff" opacity="0.9">NEZUKO</text>
</svg>
